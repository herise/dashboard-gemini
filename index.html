<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Trik Otomatis Melompat dalam 0 detik ke Link Gemini Anda -->
    <meta http-equiv="refresh" content="0; url=https://gemini.google">
    <title>Mengalihkan ke Gemini...</title>
    <!-- Tailwind CSS untuk tampilan loading -->
    <script src="https://jsdelivr.net"></script>
</head>
<body class="bg-slate-950 text-slate-200 flex items-center justify-center h-screen font-sans">

    <div class="text-center space-y-4 px-4">
        <!-- Animasi Loading Bulat Spinner -->
        <div class="w-12 h-12 border-4 border-teal-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
        
        <h1 class="text-xl font-semibold text-teal-400">Membuka Dashboard Gemini</h1>
        <p class="text-sm text-slate-400">Sedang mengalihkan Anda secara otomatis...</p>
        
        <!-- Tombol Cadangan jika browser HP user memblokir auto-redirect -->
        <div class="pt-4">
            <a href="https://gemini.google" 
               class="inline-block bg-slate-800 hover:bg-slate-700 text-teal-400 border border-slate-700 text-xs px-4 py-2 rounded-lg font-mono transition">
                Klik di sini jika tidak berpindah ↗
            </a>
        </div>
    </div>

</body>
</html>
