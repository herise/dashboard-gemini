<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI Chat Dashboard</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://jsdelivr.net"></script>
</head>
<body class="bg-slate-900 text-white flex flex-col h-screen">

    <!-- Header -->
    <header class="p-4 bg-slate-800 shadow-md flex justify-between items-center border-b border-slate-700">
        <h1 class="text-xl font-bold text-teal-400">🛡️ Gemini Secure Dashboard</h1>
        <span class="text-xs bg-teal-500/20 text-teal-300 px-3 py-1 rounded-full border border-teal-500/30">Koneksi Aman</span>
    </header>

    <!-- Chat Box -->
    <div id="chat-box" class="flex-1 p-4 overflow-y-auto space-y-4">
        <div class="flex justify-start">
            <div class="bg-slate-800 p-3 rounded-lg max-w-[80%] border border-slate-700">
                Halo! Dashboard ini sudah diamankan menggunakan serverless backend Vercel. Silakan ketik pesan!
            </div>
        </div>
    </div>

    <!-- Input Bar -->
    <div class="p-4 bg-slate-800 border-t border-slate-700">
        <form id="chat-form" class="flex gap-2 max-w-4xl mx-auto">
            <input type="text" id="user-input" placeholder="Ketik pesan Anda di sini..." autocomplete="off" required
                class="flex-1 p-3 rounded-lg bg-slate-900 border border-slate-700 focus:outline-none focus:border-teal-400 text-sm">
            <button type="submit" id="send-btn" 
                class="bg-teal-500 hover:bg-teal-600 px-5 py-3 rounded-lg font-medium text-slate-950 transition text-sm">
                Kirim
            </button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
